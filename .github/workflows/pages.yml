name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PROJECT_PATH: LoadingIndicators.Avalonia.Demo/LoadingIndicators.Avalonia.Demo.Browser/LoadingIndicators.Avalonia.Demo.Browser.csproj
  TFM: net10.0-browser

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools
        run: dotnet workload install wasm-tools-net8

      - name: Publish .NET Project
        run: dotnet publish "$PROJECT_PATH" -c Release --nologo

      - name: Locate publish output
        id: out
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$(dirname "$PROJECT_PATH")"

          CANDIDATE1="$ROOT/bin/Release/${TFM}/publish/wwwroot"
          CANDIDATE2="$ROOT/bin/Release/${TFM}/release/wwwroot"
          CANDIDATE3="$ROOT/bin/Release/${TFM}/browser-wasm/AppBundle"

          if [ -d "$CANDIDATE1" ]; then OUT="$CANDIDATE1"
          elif [ -d "$CANDIDATE2" ]; then OUT="$CANDIDATE2"
          elif [ -d "$CANDIDATE3" ]; then OUT="$CANDIDATE3"
          else
            echo "Could not locate wwwroot. Checked:"
            echo "  $CANDIDATE1"
            echo "  $CANDIDATE2"
            echo "  $CANDIDATE3"
            exit 1
          fi

          echo "dir=$OUT" >> "$GITHUB_OUTPUT"
          echo "Using publish dir: $OUT"

      - name: Prepare Pages artifacts
        run: |
          mkdir -p site
          cp -r "${{ steps.out.outputs.dir }}/." site/

          # Ensure GitHub Pages serves _framework and friends
          touch site/.nojekyll

          # Adjust <base href> for /<repo>/ hosting
          REPO="${GITHUB_REPOSITORY#*/}"
          if grep -q '<base href="/"' site/index.html; then
            sed -i "s#<base href=\"/\"#<base href=\"/${REPO}/\"#g" site/index.html
          fi

          # SPA-style fallback
          cp site/index.html site/404.html || true

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          clean: true
