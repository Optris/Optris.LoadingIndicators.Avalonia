name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  PROJECT_PATH: LoadingIndicators.Avalonia.Demo/LoadingIndicators.Avalonia.Demo.Browser/LoadingIndicators.Avalonia.Demo.Browser.csproj
  TFM: net8.0-browser

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install wasm-tools
        run: dotnet workload install wasm-tools-net8

      - name: Publish .NET Project
        run: dotnet publish "$PROJECT_PATH" -c Release --nologo

      - name: Locate publish output
        id: out
        shell: bash
        run: |
          ROOT="$(dirname "$PROJECT_PATH")"
          OUT="$ROOT/bin/Release/${TFM}/publish/wwwroot"
          # Fallback for older layouts
          if [ ! -d "$OUT" ]; then
            OUT="$ROOT/bin/Release/${TFM}/browser-wasm/AppBundle"
          fi
          echo "dir=$OUT" >> "$GITHUB_OUTPUT"
          echo "Using publish dir: $OUT"

      - name: Prepare Pages artifacts
        run: |
          mkdir -p site
          cp -r "${{ steps.out.outputs.dir }}/." site/

          # Ensure GitHub Pages serves _framework and friends
          touch site/.nojekyll

          # Adjust <base href> for /<repo>/ hosting
          REPO="${GITHUB_REPOSITORY#*/}"
          if grep -q '<base href="/"' site/index.html; then
            sed -i "s#<base href=\"/\"#<base href=\"/${REPO}/\"#g" site/index.html
          fi

          # SPA-style fallback
          cp site/index.html site/404.html || true

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          clean: true
