name: Deploy to GitHub Pages

env:
  PROJECT_PATH: LoadingIndicators.Avalonia.Demo/LoadingIndicators.Avalonia.Demo.Browser/LoadingIndicators.Avalonia.Demo.Browser.csproj
  OUTPUT_PATH: LoadingIndicators.Avalonia.Demo/LoadingIndicators.Avalonia.Demo.Browser/bin/Release/net8.0-browser/wwwroot
on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install wasm-tools
        run: dotnet workload install wasm-tools-net8

      - name: Publish .NET Project
        run: dotnet publish $PROJECT_PATH -c Release --output release --nologo

      - name: Locate publish output
        id: out
        shell: bash
        run: echo "dir=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"

      - name: Prepare Pages artifacts
        run: |
          mkdir -p site
          cp -r "${{ steps.out.outputs.dir }}/." site/

          # Ensure GitHub Pages serves _framework and friends
          touch site/.nojekyll

          # make <base href> point at /<repo>/
          REPO="${GITHUB_REPOSITORY#*/}"
          if grep -q '<base href="/"' site/index.html; then
            sed -i "s#<base href=\"/\"#<base href=\"/${REPO}/\"#g" site/index.html
          fi

          # SPA-style fallback
          cp site/index.html site/404.html || true

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          clean: true
