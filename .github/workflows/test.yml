name: Test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build
        run: dotnet build LoadingIndicators.Avalonia/LoadingIndicators.Avalonia.csproj -c Release
